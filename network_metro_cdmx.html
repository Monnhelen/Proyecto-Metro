<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e0e0e0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:10px 18px;background:#161b27;border-bottom:1px solid #262f44;flex-shrink:0;flex-wrap:wrap}
  h1{font-size:14px;font-weight:700;letter-spacing:.5px;color:#fff;white-space:nowrap}
  h1 span{color:#C8A219}
  .view-btns{display:flex;gap:6px}
  .vbtn{padding:6px 14px;border:1px solid #3a4460;border-radius:20px;background:transparent;color:#8a9bbf;font-size:12px;cursor:pointer;transition:all .2s}
  .vbtn.active{background:#C8A219;color:#000;border-color:#C8A219;font-weight:700}
  .vbtn:hover:not(.active){background:#23293a;color:#fff}
  .sep{width:1px;height:20px;background:#3a4460}
  .legend{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  .li{display:flex;align-items:center;gap:5px;font-size:11px;color:#8a9bbf;cursor:pointer;padding:3px 7px;border-radius:12px;border:1px solid transparent;user-select:none;transition:all .18s}
  .li:hover{border-color:#3a4460;background:#1e2535}
  .li.off{opacity:.32;text-decoration:line-through}
  .lc{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:opacity .18s}
  #canvas{flex:1;position:relative;overflow:hidden}
  svg{width:100%;height:100%}
  .link{stroke-opacity:.5;transition:stroke-opacity .2s}
  .node{cursor:pointer}
  .node circle{transition:r .3s ease,fill .2s}
  .node:hover circle{filter:brightness(1.4)}
  .node text{pointer-events:none;font-size:9px;fill:#ccc;text-anchor:middle}
  /* Tooltip */
  #tooltip{position:fixed;background:#1e2535;border:1px solid #3a4460;border-radius:8px;padding:8px 12px;font-size:12px;color:#e0e0e0;pointer-events:none;opacity:0;transition:opacity .15s;max-width:180px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
  /* Popup */
  #popup{position:fixed;right:18px;top:60px;width:300px;max-height:calc(100vh - 80px);overflow-y:auto;background:#1a2035;border:1px solid #3a4460;border-radius:12px;padding:16px;z-index:200;box-shadow:0 8px 40px rgba(0,0,0,.7);display:none}
  #popup-close{position:sticky;top:0;float:right;background:#e74c3c;border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;line-height:22px;text-align:center;margin:-4px -4px 8px 8px}
  #popup-content{clear:both;font-family:sans-serif;font-size:13px}
  #popup-content *{color:#ddd!important;border-color:#3a4460!important}
  #popup-content b{color:#fff!important}
  #popup-content table{width:100%}
  /* Scrollbar */
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#161b27}::-webkit-scrollbar-thumb{background:#3a4460;border-radius:3px}
  .info-bar{font-size:11px;color:#556;padding:4px 18px;background:#161b27;border-top:1px solid #1e2535;flex-shrink:0}
  .highlighted circle{stroke:#fff!important;stroke-width:2.5px!important}
  .dimmed{opacity:.15}
</style>
</head>

// ─── COLOR SCALES ─────────────────────────────────────────────────────────────
const LINE_COLORS = {
  '1':'#E91E8C','2':'#0B4EA2','3':'#6B8E23','7':'#F47920',
  '8':'#00A85D','9':'#836539','12':'#C8A219','A':'#8B2FC9'
};
const ACCESS_COLORS = {
  AccesoFuncional:'#27ae60',AccesoNoFuncional:'#e74c3c',SinAccesos:'#7f8c8d',Especial:'#7f8c8d'
};
function nodeColor(d){
  if(d.tipo==='Estación') return LINE_COLORS[d.cat]||'#888';
  return ACCESS_COLORS[d.cat]||'#888';
}
function nodeRadius(d,view){
  if(d.tipo==='Acceso'||d.tipo==='Especial'){
    if(view==='radial') return 18;
    return d.id==='SinAccesos'?16:14;
  }
  const base = Math.sqrt(d.afluencia/600);
  return Math.max(5, Math.min(22, base));
}

// ─── CATEGORY FILTER STATE ───────────────────────────────────────────────────
const hiddenCats = new Set();

function toggleCat(cat){
  if(hiddenCats.has(cat)) hiddenCats.delete(cat);
  else hiddenCats.add(cat);
  document.getElementById('leg-'+cat)?.classList.toggle('off', hiddenCats.has(cat));
  applyFilters();
}

function applyFilters(){
  if(!nodeSel) return;
  nodeSel.style('display', d => hiddenCats.has(d.cat) ? 'none' : null);
  linksG.selectAll('g.lgrp').style('display', d => {
    const sid = typeof d.source==='object'?d.source.id:d.source;
    const tid = typeof d.target==='object'?d.target.id:d.target;
    const sn = nodeMap[sid], tn = nodeMap[tid];
    return (sn&&hiddenCats.has(sn.cat))||(tn&&hiddenCats.has(tn.cat)) ? 'none' : null;
  });
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentView = 'network';
let simulation = null;
const nodeMap = {};
RAW_NODES.forEach(n=>nodeMap[n.id]=n);

// ─── SVG SETUP ────────────────────────────────────────────────────────────────
const svg = d3.select('#svg');
const linksG = d3.select('#links-g');
const nodesG = d3.select('#nodes-g');
let W = 0, H = 0;

function dims(){
  const el = document.getElementById('canvas');
  W = el.clientWidth; H = el.clientHeight;
}

// Zoom
const zoom = d3.zoom().scaleExtent([0.2,4]).on('zoom',e=>{
  linksG.attr('transform',e.transform);
  nodesG.attr('transform',e.transform);
});
svg.call(zoom);

// ─── TOOLTIP / POPUP ──────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
const popup = document.getElementById('popup');
const popupContent = document.getElementById('popup-content');
let popupOpen = false;

function showTooltip(event,d){
  const label = d.id.replace(/_/g,' ');
  tooltip.innerHTML = `<b>${label}</b><br><span style="color:#888;font-size:11px">${d.tipo} ${d.cat!==d.tipo?'· '+d.cat:''}</span>`;
  tooltip.style.opacity='1';
  moveTooltip(event);
}
function moveTooltip(event){
  const x = event.clientX+14, y = event.clientY-10;
  tooltip.style.left = Math.min(x, window.innerWidth-200)+'px';
  tooltip.style.top  = Math.max(y,10)+'px';
}
function hideTooltip(){tooltip.style.opacity='0';}

function showPopup(d){
  popupContent.innerHTML = d.html;
  popup.style.display = 'block';
  popupOpen = true;
}
function closePopup(){
  popup.style.display = 'none';
  popupOpen = false;
  nodesG.selectAll('.node').classed('dimmed',false).classed('highlighted',false);
  linksG.selectAll('line,path').classed('dimmed',false);
}

// ─── BUILD NODES / LINKS ──────────────────────────────────────────────────────
const nodes = RAW_NODES.map(d=>({...d}));
const links = RAW_LINKS.map(d=>({source:d.s,target:d.t,w:d.w}));

// ─── DRAW ELEMENTS ────────────────────────────────────────────────────────────
let linkSel, nodeSel;

function linkStroke(d){ return Math.max(1.5, d.w * 1.1); }
function linkColor(d){
  const src = nodeMap[typeof d.source==='object'?d.source.id:d.source];
  if(!src) return '#444';
  if(src.cat==='SinAccesos') return '#55606a';
  if(src.cat==='AccesoNoFuncional') return '#c0392b';
  return '#27ae60';
}

function buildDOM(){
  linksG.selectAll('*').remove();
  nodesG.selectAll('*').remove();

  // Each link is a <g> with a <line> + weight <text>
  const linkGrp = linksG.selectAll('g.lgrp').data(links).join('g').attr('class','lgrp');

  linkSel = linkGrp.append('line')
    .attr('class','link')
    .attr('stroke', linkColor)
    .attr('stroke-width', linkStroke)
    .attr('stroke-opacity', 0.45);

  // Weight label, hidden by default, shown on group hover
  linkGrp.append('text')
    .attr('class','wlabel')
    .attr('text-anchor','middle')
    .attr('dy','0.35em')
    .style('font-size','10px')
    .style('fill','#ffe')
    .style('pointer-events','none')
    .style('opacity', 0)
    .style('text-shadow','0 0 4px #000')
    .text(d => d.w > 0 ? d.w : '');

  linkGrp
    .on('mouseover',(e,d)=>{
      const src = nodeMap[typeof d.source==='object'?d.source.id:d.source];
      const tgt = nodeMap[typeof d.target==='object'?d.target.id:d.target];
      const sl = src?src.id.replace(/_/g,' '):'?';
      const tl = tgt?tgt.id.replace(/_/g,' '):'?';
      tooltip.innerHTML = `<span style="color:#aaa;font-size:10px">${sl}</span><br><b style="color:#C8A219">Peso: ${d.w}</b><br><span style="color:#aaa;font-size:10px">${tl}</span>`;
      tooltip.style.opacity='1';
      moveTooltip(e);
      d3.select(e.currentTarget).select('line')
        .attr('stroke-opacity',1)
        .attr('stroke-width', d2=>Math.max(3, d2.w*1.8));
      d3.select(e.currentTarget).select('.wlabel').style('opacity',1);
    })
    .on('mousemove', moveTooltip)
    .on('mouseout',(e)=>{
      hideTooltip();
      d3.select(e.currentTarget).select('line')
        .attr('stroke-opacity',0.45)
        .attr('stroke-width', linkStroke);
      d3.select(e.currentTarget).select('.wlabel').style('opacity',0);
    });

  nodeSel = nodesG.selectAll('.node').data(nodes,d=>d.id).join(
    enter=>{
      const g = enter.append('g').attr('class','node');
      g.append('circle')
        .attr('r', d=>nodeRadius(d,currentView))
        .attr('fill', d=>nodeColor(d))
        .attr('stroke', d=>d.tipo==='Acceso'||d.tipo==='Especial'?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.3)')
        .attr('stroke-width',1.5);
      g.append('text').attr('dy','0.35em').attr('y',d=>nodeRadius(d,currentView)+9)
        .text(d=>{
          const label = d.id.replace(/_/g,' ');
          return label.length>14?label.slice(0,13)+'…':label;
        });
      return g;
    }
  );

  nodeSel
    .on('mouseover',(e,d)=>{showTooltip(e,d); highlightConnected(d);})
    .on('mousemove', moveTooltip)
    .on('mouseout', (e,d)=>{hideTooltip(); if(!popupOpen) unhighlight();})
    .on('click',(e,d)=>{
      e.stopPropagation();
      showPopup(d);
      highlightConnected(d);
    });

  svg.on('click',(e)=>{if(!popup.contains(e.target)&&!e.target.closest('.node')) closePopup();});
  applyFilters();
}

function highlightConnected(d){
  const connectedIds = new Set([d.id]);
  links.forEach(l=>{
    const sid = typeof l.source==='object'?l.source.id:l.source;
    const tid = typeof l.target==='object'?l.target.id:l.target;
    if(sid===d.id) connectedIds.add(tid);
    if(tid===d.id) connectedIds.add(sid);
  });
  nodeSel.classed('dimmed',n=>!connectedIds.has(n.id));
  nodeSel.classed('highlighted',n=>n.id===d.id);
  linksG.selectAll('g.lgrp').classed('dimmed',l=>{
    const sid = typeof l.source==='object'?l.source.id:l.source;
    const tid = typeof l.target==='object'?l.target.id:l.target;
    return sid!==d.id&&tid!==d.id;
  });
}
function unhighlight(){
  nodeSel.classed('dimmed',false).classed('highlighted',false);
  linksG.selectAll('g.lgrp').classed('dimmed',false);
}

// ─── VIEWS ────────────────────────────────────────────────────────────────────
function setView(v){
  currentView = v;
  ['network','radial','arch'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('active',x===v);
  });
  closePopup();
  if(simulation) simulation.stop();

  if(v==='network') drawNetwork();
  else if(v==='radial') drawRadial();
  else drawArch();
}

// NETWORK (Force-directed)
function drawNetwork(){
  dims(); buildDOM();

  // Update circle radii for this view
  nodeSel.select('circle').attr('r',d=>nodeRadius(d,'network'));

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id).distance(d=>{
      const src = nodeMap[typeof d.source==='object'?d.source.id:d.source];
      return src&&src.tipo==='Acceso'?60:40;
    }).strength(0.5))
    .force('charge', d3.forceManyBody().strength(d=>d.tipo==='Acceso'?-400:-150))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(d=>nodeRadius(d,'network')+4))
    .on('tick', ticked);

  // Drag
  nodeSel.call(d3.drag()
    .on('start',(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on('end',(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;})
  );
  document.getElementById('info-bar').textContent='Arrastra los nodos · Scroll para hacer zoom · Click para detalles';
}

function ticked(){
  linksG.selectAll('g.lgrp').each(function(d){
    const sx=d.source.x,sy=d.source.y,tx=d.target.x,ty=d.target.y;
    d3.select(this).select('line')
      .attr('x1',sx).attr('y1',sy).attr('x2',tx).attr('y2',ty);
    d3.select(this).select('.wlabel')
      .attr('x',(sx+tx)/2).attr('y',(sy+ty)/2);
  });
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
}

// RADIAL
function drawRadial(){
  dims(); buildDOM();

  // Replace lines with paths inside the existing lgrp groups
  linksG.selectAll('g.lgrp line').remove();
  const arcPaths = linksG.selectAll('g.lgrp').append('path')
    .attr('class','link').attr('fill','none')
    .attr('stroke', linkColor)
    .attr('stroke-width', linkStroke)
    .attr('stroke-opacity', 0.4);

  const cx = W/2, cy = H/2;
  const R1 = Math.min(W,H)*0.12;
  const R2 = Math.min(W,H)*0.37;

  const accessNodes = nodes.filter(d=>d.tipo==='Acceso'||d.tipo==='Especial');
  const stationNodes = nodes.filter(d=>d.tipo==='Estación').sort((a,b)=>a.cat.localeCompare(b.cat)||b.afluencia-a.afluencia);

  accessNodes.forEach((d,i)=>{
    const angle = (i/accessNodes.length)*2*Math.PI - Math.PI/2;
    d.rx = cx + R1*Math.cos(angle); d.ry = cy + R1*Math.sin(angle);
  });
  stationNodes.forEach((d,i)=>{
    const angle = (i/stationNodes.length)*2*Math.PI - Math.PI/2;
    const r = R2 + nodeRadius(d,'radial')*0.3;
    d.rx = cx + r*Math.cos(angle); d.ry = cy + r*Math.sin(angle);
  });
  nodes.forEach(d=>{if(d.rx===undefined){d.rx=cx;d.ry=cy;}});

  nodeSel.select('circle').attr('r',d=>nodeRadius(d,'radial'));
  nodeSel.transition().duration(700).ease(d3.easeCubicInOut)
    .attr('transform',d=>`translate(${d.rx},${d.ry})`);

  const posMap = {};
  nodes.forEach(d=>posMap[d.id]={x:d.rx,y:d.ry});

  setTimeout(()=>{
    linksG.selectAll('g.lgrp').each(function(d){
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      const s = posMap[sid], t = posMap[tid];
      if(!s||!t) return;
      const mx = (s.x+t.x)/2*.5+cx*.5;
      const my = (s.y+t.y)/2*.5+cy*.5;
      d3.select(this).select('path').attr('d',`M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`);
      d3.select(this).select('.wlabel').attr('x',mx).attr('y',my);
    });
    applyFilters();
  }, 750);

  document.getElementById('info-bar').textContent='Vista radial: accesos al centro · estaciones agrupadas por línea · Click para detalles';
}

// ARCH
function drawArch(){
  dims(); buildDOM();

  linksG.selectAll('g.lgrp line').remove();
  linksG.selectAll('g.lgrp').append('path')
    .attr('class','link').attr('fill','none')
    .attr('stroke', linkColor)
    .attr('stroke-width', linkStroke)
    .attr('stroke-opacity', 0.42);

  const accessNodes = nodes.filter(d=>d.tipo==='Acceso'||d.tipo==='Especial');
  const lineOrder = {'1':0,'2':1,'3':2,'7':3,'8':4,'9':5,'12':6,'A':7};
  const stationNodes = nodes.filter(d=>d.tipo==='Estación')
    .sort((a,b)=>(lineOrder[a.cat]??9)-(lineOrder[b.cat]??9)||b.afluencia-a.afluencia);

  const totalNodes = [...accessNodes, ...stationNodes];
  const padX = 60;
  const baseY = H*0.72;
  const step = (W - padX*2) / (totalNodes.length - 1);

  const posMap = {};
  totalNodes.forEach((d,i)=>{
    d.ax = padX + i*step; d.ay = baseY;
    posMap[d.id] = {x:d.ax, y:d.ay, i};
  });

  nodeSel.select('circle').attr('r',d=>Math.max(5,nodeRadius(d,'arch')));
  nodeSel.transition().duration(600).ease(d3.easeCubicInOut)
    .attr('transform',d=>`translate(${d.ax},${d.ay})`);
  nodeSel.select('text')
    .attr('transform','rotate(-60)').attr('text-anchor','end')
    .attr('y',0).attr('dx',-6).attr('dy','0.35em');

  setTimeout(()=>{
    linksG.selectAll('g.lgrp').each(function(d){
      const sid = typeof d.source==='object'?d.source.id:d.source;
      const tid = typeof d.target==='object'?d.target.id:d.target;
      const s = posMap[sid], t = posMap[tid];
      if(!s||!t) return;
      const dist = Math.abs(s.i-t.i);
      const h = Math.min(dist*18, H*0.6);
      const mx = (s.x+t.x)/2, my = baseY - h;
      d3.select(this).select('path').attr('d',`M${s.x},${s.y} Q${mx},${my} ${t.x},${t.y}`);
      d3.select(this).select('.wlabel').attr('x',mx).attr('y',my-8);
    });
    applyFilters();
  }, 650);

  document.getElementById('info-bar').textContent='Vista Arch: arcos conectando accesos (izq.) con estaciones por línea · Click para detalles';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{if(currentView==='network'){if(simulation){dims();simulation.force('center',d3.forceCenter(W/2,H/2)).restart();}}else{setView(currentView);}});
dims();
svg.call(zoom.transform, d3.zoomIdentity);
drawNetwork();
</script>
